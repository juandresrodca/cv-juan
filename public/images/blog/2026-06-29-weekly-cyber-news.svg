<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" fill="none" role="img" aria-label="Weekly cybersecurity roundup: post-quantum cryptography, APTs, and supply-chain threats">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.78" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#2563eb" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2563eb" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="1200" height="480" fill="url(#bg)"/>
  <rect width="1200" height="480" fill="url(#glow)"/>

  <!-- Faint hex/circuit grid -->
  <g stroke="#334155" stroke-width="1" opacity="0.35">
    <path d="M0 120 H1200 M0 240 H1200 M0 360 H1200"/>
    <path d="M200 0 V480 M400 0 V480 M600 0 V480 M800 0 V480 M1000 0 V480"/>
  </g>
  <g stroke="#3b82f6" stroke-width="1.5" opacity="0.4" fill="none">
    <path d="M120 300 H240 L280 260 H360"/>
    <path d="M120 360 H200 L240 400 H340"/>
    <circle cx="360" cy="260" r="4" fill="#3b82f6" stroke="none"/>
    <circle cx="340" cy="400" r="4" fill="#3b82f6" stroke="none"/>
    <circle cx="120" cy="300" r="4" fill="#3b82f6" stroke="none"/>
  </g>

  <!-- Quantum orbital motif (right side) -->
  <g transform="translate(890 240)">
    <ellipse cx="0" cy="0" rx="150" ry="58" stroke="url(#ring)" stroke-width="2.5" opacity="0.9" transform="rotate(0)"/>
    <ellipse cx="0" cy="0" rx="150" ry="58" stroke="url(#ring)" stroke-width="2.5" opacity="0.7" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="150" ry="58" stroke="url(#ring)" stroke-width="2.5" opacity="0.5" transform="rotate(120)"/>
    <!-- electrons -->
    <circle cx="150" cy="0" r="6" fill="#60a5fa"/>
    <circle cx="-75" cy="50" r="5" fill="#93c5fd"/>
    <circle cx="30" cy="-72" r="5" fill="#10b981"/>
    <!-- nucleus / lock -->
    <circle cx="0" cy="0" r="34" fill="#0b1220" stroke="#2563eb" stroke-width="2.5"/>
    <g transform="translate(0 2)" stroke="#60a5fa" stroke-width="3" fill="none" stroke-linecap="round">
      <rect x="-12" y="-2" width="24" height="18" rx="3" fill="#60a5fa" fill-opacity="0.15"/>
      <path d="M-7 -2 V-9 a7 7 0 0 1 14 0 V-2"/>
      <circle cx="0" cy="7" r="2.5" fill="#60a5fa" stroke="none"/>
    </g>
  </g>

  <!-- Threat badge dots -->
  <g>
    <circle cx="705" cy="120" r="5" fill="#f59e0b"/>
    <circle cx="745" cy="150" r="3.5" fill="#ef4444"/>
    <circle cx="680" cy="360" r="4" fill="#10b981"/>
  </g>

  <!-- Text -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
    <text x="100" y="150" fill="#60a5fa" font-size="20" font-weight="600" letter-spacing="3">WEEKLY CYBER NEWS</text>
    <text x="100" y="215" fill="#ffffff" font-size="52" font-weight="800">The Quantum Leap,</text>
    <text x="100" y="275" fill="#ffffff" font-size="52" font-weight="800">APTs &amp; Supply Chain</text>
    <text x="100" y="330" fill="#94a3b8" font-size="20" font-weight="400">Post-quantum crypto · state-sponsored threats · libssh2 RCE</text>
    <text x="100" y="418" fill="#64748b" font-size="16" font-weight="500">Juan Rodriguez · 29 June 2026</text>
  </g>
</svg>
