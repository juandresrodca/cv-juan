<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0f2056"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="jgold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f7e06a"/>
      <stop offset="100%" stop-color="#d4a41a"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect width="32" height="32" rx="5.5" fill="url(#bg)"/>

  <!-- Subtle inner border highlight (matches design-kit inset glow) -->
  <rect x="0.75" y="0.75" width="30.5" height="30.5" rx="5"
        fill="none" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>

  <!-- JARC — J in gold, ARC in crisp white -->
  <text
    x="16" y="21.5"
    font-family="'Arial Black', Impact, 'Helvetica Neue', Arial, sans-serif"
    font-size="11.5"
    font-weight="900"
    text-anchor="middle"
    letter-spacing="-0.2"
  ><tspan fill="url(#jgold)">J</tspan><tspan fill="#e8f0fe">ARC</tspan></text>
</svg>
